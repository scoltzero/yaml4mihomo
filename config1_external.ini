[custom]
; Generated from config1.yaml for subconverter external config usage.
; The original Mihomo YAML remains the Clash rule base so rule-providers, proxy-providers,
; rules, and other Mihomo-specific fields stay aligned with config1.yaml.
enable_rule_generator=false
overwrite_original_rules=false
clash_rule_base=https://raw.githubusercontent.com/scoltzero/yaml4mihomo/refs/heads/main/config1_base.yaml

custom_proxy_group=节点选择`select`[]香港节点`[]新加坡节点`[]韩国节点`[]台湾节点`[]日本节点`[]美国节点`[]省流节点`[]高级节点`[]手动切换`[]全球直连`[]机场节点
custom_proxy_group=手动切换`select`[]台湾节点`[]香港节点`[]全球直连`[]日本节点`[]新加坡节点`[]美国节点`[]韩国节点`[]省流节点`[]高级节点`[]游戏节点`[]机场节点
custom_proxy_group=漏网之鱼`select`[]节点选择`[]全球直连`[]香港节点`[]新加坡节点`[]韩国节点`[]台湾节点`[]日本节点`[]美国节点`[]省流节点`[]高级节点`[]手动切换`[]机场节点
custom_proxy_group=网络测试`select`[]全球直连`[]节点选择`[]香港节点`[]新加坡节点`[]韩国节点`[]台湾节点`[]日本节点`[]美国节点`[]省流节点`[]高级节点`[]手动切换`[]机场节点
custom_proxy_group=谷歌服务`select`[]节点选择`[]人工智能`[]香港节点`[]新加坡节点`[]韩国节点`[]台湾节点`[]日本节点`[]美国节点`[]手动切换
custom_proxy_group=人工智能`select`[]节点选择`[]香港节点`[]新加坡节点`[]韩国节点`[]台湾节点`[]日本节点`[]美国节点`[]高级节点`[]手动切换`[]全球直连`[]机场节点
custom_proxy_group=游戏平台`select`[]节点选择`[]全球直连`[]高级节点`[]游戏节点
custom_proxy_group=Netflix`select`[]节点选择`[]香港节点`[]新加坡节点`[]韩国节点`[]台湾节点`[]日本节点`[]美国节点`[]省流节点`[]高级节点`[]手动切换`[]机场节点
custom_proxy_group=苹果服务`select`[]全球直连`[]香港节点`[]新加坡节点`[]韩国节点`[]台湾节点`[]日本节点`[]美国节点`[]手动切换
custom_proxy_group=微软服务`select`[]全球直连`[]节点选择
custom_proxy_group=TikTok`select`[]节点选择`[]香港节点`[]新加坡节点`[]韩国节点`[]台湾节点`[]日本节点`[]美国节点`[]省流节点`[]高级节点`[]手动切换`[]机场节点
custom_proxy_group=Spotify`select`[]节点选择`[]香港节点`[]新加坡节点`[]韩国节点`[]台湾节点`[]日本节点`[]美国节点`[]省流节点`[]高级节点`[]手动切换`[]机场节点
custom_proxy_group=PT站点`select`[]全球直连`[]节点选择`[]香港节点
custom_proxy_group=Telegram`select`[]节点选择`[]香港节点`[]新加坡节点`[]韩国节点`[]台湾节点`[]日本节点`[]美国节点
custom_proxy_group=高级节点`url-test`(专线|专用|高级|直连|急速|高倍率|IEPL|IPLC|AIA|CTM|CC|iepl|iplc|aia|ctm|cc|AC|x3|X3|x5|X5)`http://detectportal.firefox.com/success.txt`30,2,20
custom_proxy_group=游戏节点`url-test`^(?=.*((?i)游戏|🎮|(\b(GAME)\b)))(?!.*((?i)回国|校园)).*$`http://detectportal.firefox.com/success.txt`30,2,20
custom_proxy_group=香港节点`url-test`^(?=.*(?<!深)(港|HK|(?i)Hong))(?!(.*(台|本|坡|美))).*$`http://detectportal.firefox.com/success.txt`30,2,20
custom_proxy_group=新加坡节点`url-test`^(?=.*(?i)(坡|🇸🇬|SG|Sing|SIN|XSP)).*$`http://detectportal.firefox.com/success.txt`30,2,20
custom_proxy_group=韩国节点`url-test`^(?=.*(?i)(韩|🇰🇷|韓|首尔|南朝鲜|KR|KOR|Korea|South)).*$`http://detectportal.firefox.com/success.txt`30,2,20
custom_proxy_group=台湾节点`url-test`^(?=.*(?i)(台|🇼🇸|🇹🇼|TW|tai|TPE|TSA|KHH)).*$`http://detectportal.firefox.com/success.txt`30,2,20
custom_proxy_group=日本节点`url-test`^(?=.*(?i)(日|🇯🇵|JP|Japan|NRT|HND|KIX|CTS|FUK)).*$`http://detectportal.firefox.com/success.txt`30,2,20
custom_proxy_group=美国节点`url-test`^(?=.*(?i)(美|🇺🇸|US|USA|JFK|LAX|ORD|ATL|DFW|SFO|MIA|SEA|IAD)).*$`http://detectportal.firefox.com/success.txt`30,2,20
custom_proxy_group=省流节点`url-test`(0.[1-5]|低倍率|省流|大流量)`http://detectportal.firefox.com/success.txt`30,2,20
custom_proxy_group=机场节点`select`^(?!.*(DIRECT|群|邀请|返利|循环|官网|客服|网站|网址|获取|订阅|流量|到期|机场|下次|版本|官址|备用|过期|已用|联系|邮箱|工单|贩卖|通知|倒卖|防止|国内|地址|频道|无法|说明|使用|提示|特别|访问|支持|教程|关注|更新|作者|加入|过滤|USE|USED|TOTAL|EXPIRE|EMAIL|Panel|Channel|Author))`!!PROVIDER=msm_manual
custom_proxy_group=全球直连`select`[]DIRECT
