  - name: "高级节点"
    type: "url-test"
    interval: 30
    tolerance: 20
    lazy: true
    url: "http://detectportal.firefox.com/success.txt"
    disable-udp: false
    timeout: 2000
    max-failed-times: 3
    hidden: true
    include-all: true
    include-all-proxies: true
    include-all-providers: true
    filter: "(专线|专用|高级|直连|急速|高倍率|IEPL|IPLC|AIA|CTM|CC|iepl|iplc|aia|ctm|cc|AC|x3|X3|x5|X5)"
    icon: "https://raw.githubusercontent.com/Koolson/Qure/refs/heads/master/IconSet/Color/VIP.png"
  - name: "游戏节点"
    type: "url-test"
    interval: 30
    tolerance: 20
    lazy: true
    url: "http://detectportal.firefox.com/success.txt"
    disable-udp: false
    timeout: 2000
    max-failed-times: 3
    hidden: true
    include-all: true
    include-all-proxies: true
    include-all-providers: true
    filter: "^(?=.*((?i)游戏|🎮|(\\b(GAME)\\b)))(?!.*((?i)回国|校园)).*$"
    icon: "https://raw.githubusercontent.com/Koolson/Qure/refs/heads/master/IconSet/Color/Game.png"
  - name: "香港节点"
    type: "url-test"
    interval: 30
    tolerance: 20
    lazy: true
    url: "http://detectportal.firefox.com/success.txt"
    disable-udp: false
    timeout: 2000
    max-failed-times: 3
    hidden: true
    include-all: true
    include-all-proxies: true
    include-all-providers: true
    filter: "^(?=.*(?<!深)(港|HK|(?i)Hong))(?!(.*(台|本|坡|美))).*$"
    icon: "https://raw.githubusercontent.com/Koolson/Qure/refs/heads/master/IconSet/Color/Hong_Kong.png"
  - name: "新加坡节点"
